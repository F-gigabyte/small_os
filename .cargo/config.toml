# tell the compiler to compile these sections of the standard library
# Based on https://os.phil-opp.com/minimal-rust-kernel/ accessed 30/04/2026
[unstable]
build-std-features = ["compiler-builtins-mem"] # makes compiler builtins provide memcpy and memset
build-std = ["core", "compiler_builtins"]

# Set default target to thumbv6m-none-eabi
[build]
target = "thumbv6m-none-eabi"
